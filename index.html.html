<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Лаборатория Курчатова</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid #667eea;
            border-top-color: #43e97b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-screen p {
            color: white;
            margin-top: 20px;
        }

        .window {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
        }

        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .diamond-btn {
            position: absolute;
            width: 150px;
            height: 100px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
            z-index: 10;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: none;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .diamond-btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        .back-btn {
            position: absolute;
            width: 87px;
            height: 53px;
            cursor: pointer;
            z-index: 10;
            background-size: cover;
            background-repeat: no-repeat;
            border: none;
        }

        .back-btn:active {
            opacity: 0.8;
            transform: scale(0.97);
        }

        .form-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 20px;
            min-width: 350px;
            text-align: center;
            z-index: 10;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .form-container h2 {
            color: white;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .form-container button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.1s;
        }

        .form-container button:active {
            opacity: 0.8;
        }

        .btn-primary {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: #1a1a2e;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        .tasks-grid {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: grid;
            grid-template-columns: repeat(4, 130px);
            gap: 20px;
            z-index: 10;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }

        .task-card {
            width: 130px;
            height: 90px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            position: relative;
            transition: transform 0.1s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .task-card:active {
            transform: scale(0.97);
        }

        .task-card.completed {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
        }

        .task-card .check-mark {
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 20px;
        }

        .task-number {
            font-size: 24px;
            font-weight: bold;
        }

        .task-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .question-box {
            position: absolute;
            left: 86px;
            top: 107px;
            width: 280px;
            color: white;
            font-size: 14px;
            line-height: 1.6;
            z-index: 10;
            text-shadow: 1px 1px 2px black;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 10px;
        }

        .answer-area {
            position: absolute;
            left: 48px;
            top: 326px;
            z-index: 10;
        }

        .answer-input {
            width: 274px;
            height: 36px;
            padding: 5px 10px;
            font-size: 14px;
            border: 2px solid #667eea;
            border-radius: 8px;
        }

        .check-btn {
            position: absolute;
            left: 400px;
            top: 325px;
            width: 134px;
            height: 73px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            border: none;
        }

        .next-btn {
            position: absolute;
            right: 50px;
            bottom: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            z-index: 10;
            font-weight: bold;
            border: none;
        }

        .next-btn:active {
            transform: scale(0.97);
        }

        .completed-msg {
            font-size: 18px;
            color: #43e97b;
            margin-top: 10px;
            font-weight: bold;
        }

        .profile-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 20px;
            min-width: 400px;
            text-align: center;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-avatar:active {
            transform: scale(0.97);
        }

        .profile-info {
            color: white;
        }

        .profile-info h3 {
            margin-bottom: 15px;
        }

        .profile-info p {
            margin: 10px 0;
        }

        .achievement {
            margin: 20px 0;
        }

        .achievement img {
            max-width: 100px;
        }

        .progress-bar {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            height: 10px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            width: 0%;
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s;
        }

        .profile-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .profile-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .users-table {
            position: absolute;
            right: 50px;
            top: 80px;
            width: 350px;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 10px;
            overflow: hidden;
            z-index: 10;
        }

        .users-table table {
            width: 100%;
            color: white;
            border-collapse: collapse;
        }

        .users-table th, .users-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #444;
        }

        .users-table th {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .user-row {
            cursor: pointer;
        }

        .user-row:hover {
            background: rgba(102, 126, 234, 0.3);
        }

        .user-row.selected {
            background: rgba(102, 126, 234, 0.5);
        }

        .current-user-panel {
            position: absolute;
            left: 50px;
            top: 50px;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border-radius: 10px;
            color: white;
            min-width: 250px;
            z-index: 10;
        }

        .current-user-panel button {
            margin-top: 10px;
            padding: 8px 15px;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .lessons-grid {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: grid;
            grid-template-columns: repeat(2, 200px);
            gap: 30px;
            z-index: 10;
        }

        .lesson-card {
            width: 200px;
            height: 130px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s;
            text-align: center;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .lesson-card:active {
            transform: scale(0.97);
        }

        .lesson-card.completed {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
        }

        .delete-user-btn {
            position: absolute;
            bottom: 20px;
            right: 50px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 10;
            font-weight: bold;
        }

        .video-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-modal video {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .close-video {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 2000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        .toast.success {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: #1a1a2e;
        }

        .toast.error {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        @media (max-width: 768px) {
            .tasks-grid {
                grid-template-columns: repeat(2, 130px);
                gap: 15px;
            }
            .lessons-grid {
                grid-template-columns: 1fr;
            }
            .question-box {
                width: 80%;
                left: 10%;
                top: 10%;
            }
            .answer-area {
                left: 10%;
                bottom: 15%;
                top: auto;
            }
            .check-btn {
                left: auto;
                right: 10%;
                top: 0;
            }
            .users-table {
                width: 90%;
                right: 5%;
                left: 5%;
                top: auto;
                bottom: 20px;
            }
            .current-user-panel {
                top: auto;
                bottom: 20px;
                left: 20px;
                right: 20px;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading-screen" id="loadingScreen">
            <div class="loader"></div>
            <p>Загрузка...</p>
        </div>
    </div>

    <script>
        // ============ ВСЯ ЛОГИКА В ОДНОМ МЕСТЕ ============
        
        // Пути к вашим файлам (измените если нужно)
        const PATHS = {
            bgMain: 'images/image (1).jpeg',
            bgLogin: 'images/image (6).jpeg',
            bgTasks: 'images/закат.png',
            bgTask: 'images/image (4).jpeg',
            btnUsers: 'images/acetone-2025128-202148-786.png',
            btnLessons: 'images/acetone-2025128-202110-537.png',
            btnTasks: 'images/acetone-2025128-202348-996.png',
            btnBack: 'images/кнопка вернуться (1).png',
            btnCheck: 'images/acetone-20251216-7246-722.png',
            bronzeMedal: 'images/бронза.png',
            silverMedal: 'images/серебро.png',
            goldMedal: 'images/золото.png'
        };

        // Задания
        const TASKS = {
            1: { question: "🐰 Заяц бежит домой в свою норку со скоростью 16 м/с, а до домика ему осталось 240 метров. Сколько времени должен бежать заяц, чтобы прибежать ровно к своей норке?", answer: "15", videoFolder: "N1video" },
            2: { question: "🚌 Водитель автобуса, проезжая по дороге поздно ночью, не видит человека. Найдите коэффициент трения, если Fтр = 200000Н, масса автобуса 5т, g = 10 м/с²", answer: "4", videoFolder: "N2video" },
            3: { question: "🏀 Баскетболист бросает мяч в кольцо, сообщив ему начальную скорость 10 м/с. Мяч летит по дуге и попадает в кольцо через 2 секунды после броска. Ускорение свободного падения g = 10 м/с². Вопрос: с какой скоростью мяч подлетел к кольцу?", answer: "10", videoFolder: "N3video" },
            4: { question: "🏗️ Кран поднимает груз на высоту 20 метров, масса которого равна 2 тонны. Найдите работу, совершаемую краном (g = 10 м/с²).", answer: "400000", videoFolder: "N4video" },
            5: { question: "🚗 Тело движется со скоростью 10 м/с. Какой путь оно пройдёт за 5 секунд?", answer: "50", videoFolder: "N5video" },
            6: { question: "⚡ Ускорение тела 2 м/с². Какую скорость приобретёт тело через 3 секунды, если начальная скорость 0?", answer: "6", videoFolder: "N6video" },
            7: { question: "💪 Сила 100 Н действует на тело массой 20 кг. Найдите ускорение.", answer: "5", videoFolder: "N7video" },
            8: { question: "💧 Плотность вещества 800 кг/м³, объём 0.5 м³. Найдите массу.", answer: "400", videoFolder: "N8video" },
            9: { question: "📐 Давление 1000 Па, площадь 2 м². Найдите силу.", answer: "2000", videoFolder: "N9video" },
            10: { question: "💡 Мощность 500 Вт, время 10 с. Найдите работу.", answer: "5000", videoFolder: "N10video" },
            11: { question: "🔄 Частота 50 Гц. Найдите период.", answer: "0.02", videoFolder: "N11video" },
            12: { question: "🌊 Длина волны 2 м, скорость 340 м/с. Найдите частоту.", answer: "170", videoFolder: "N12video" }
        };

        const App = {
            currentUser: null,
            selectedUser: null,
            
            init() {
                // Скрываем загрузочный экран через 500мс
                setTimeout(() => {
                    const loading = document.getElementById('loadingScreen');
                    if (loading) loading.style.display = 'none';
                }, 500);
                this.loadCurrentUser();
                this.showPage('main');
            },
            
            loadCurrentUser() {
                const saved = localStorage.getItem('currentUser');
                if (saved) {
                    this.currentUser = JSON.parse(saved);
                    const progress = localStorage.getItem(`progress_${this.currentUser.login}`);
                    this.currentUser.completedTasks = progress ? JSON.parse(progress) : [];
                }
            },
            
            saveCurrentUser() {
                if (this.currentUser) {
                    localStorage.setItem('currentUser', JSON.stringify(this.currentUser));
                    localStorage.setItem(`progress_${this.currentUser.login}`, JSON.stringify(this.currentUser.completedTasks));
                }
            },
            
            saveTaskProgress(taskNumber) {
                if (!this.currentUser) return false;
                if (!this.currentUser.completedTasks.includes(taskNumber)) {
                    this.currentUser.completedTasks.push(taskNumber);
                    this.saveCurrentUser();
                    return true;
                }
                return false;
            },
            
            isTaskCompleted(taskNumber) {
                return this.currentUser && this.currentUser.completedTasks.includes(taskNumber);
            },
            
            getCompletedCount() {
                return this.currentUser ? this.currentUser.completedTasks.length : 0;
            },
            
            showPage(page, params = {}) {
                const appDiv = document.getElementById('app');
                switch(page) {
                    case 'main': this.renderMainPage(appDiv); break;
                    case 'login': this.renderLoginPage(appDiv); break;
                    case 'register': this.renderRegisterPage(appDiv); break;
                    case 'tasks': this.renderTasksPage(appDiv); break;
                    case 'lessons': this.renderLessonsPage(appDiv); break;
                    case 'profile': this.renderProfilePage(appDiv); break;
                    case 'users': this.renderUsersPage(appDiv); break;
                    case 'task': this.renderTaskPage(appDiv, params.taskId); break;
                    default: this.renderMainPage(appDiv);
                }
            },
            
            renderMainPage(container) {
                const completed = this.getCompletedCount();
                document.title = this.currentUser ? `Лаборатория Курчатова - ${this.currentUser.login} (${completed}/12)` : 'Лаборатория Курчатова';
                
                container.innerHTML = `
                    <div class="window">
                        <img class="background" src="${PATHS.bgMain}" alt="Фон" onerror="this.style.display='none'">
                        <button class="diamond-btn" style="left: 127px; top: 299px; background-image: url('${PATHS.btnUsers}')" onclick="App.showPage('users')"></button>
                        <button class="diamond-btn" style="left: 316px; top: 299px; background-image: url('${PATHS.btnLessons}')" onclick="App.showPage('lessons')"></button>
                        <button class="diamond-btn" style="left: 486px; top: 299px; background-image: url('${PATHS.btnTasks}')" onclick="App.showPage('tasks')"></button>
                        <button class="back-btn" style="left: 686px; top: 400px; background-image: url('${PATHS.btnBack}')" onclick="App.showPage('profile')"></button>
                    </div>
                `;
            },
            
            renderLoginPage(container) {
                document.title = 'Вход - Лаборатория Курчатова';
                container.innerHTML = `
                    <div class="window">
                        <img class="background" src="${PATHS.bgLogin}" alt="Фон" onerror="this.style.display='none'">
                        <div class="form-container">
                            <h2>🔐 Вход в аккаунт</h2>
                            <input type="text" id="loginInput" placeholder="Логин">
                            <input type="password" id="passwordInput" placeholder="Пароль">
                            <button class="btn-primary" onclick="App.login()">Войти</button>
                            <button class="btn-secondary" onclick="App.showPage('register')">Создать аккаунт</button>
                            <button class="btn-danger" onclick="App.showPage('main')">Назад</button>
                        </div>
                    </div>
                `;
            },
            
            login() {
                const login = document.getElementById('loginInput').value.trim();
                const password = document.getElementById('passwordInput').value;
                if (!login || !password) { this.showToast('Введите логин и пароль!', 'error'); return; }
                
                const userData = localStorage.getItem(`user_${login}`);
                if (!userData) { this.showToast('Пользователь не найден!', 'error'); return; }
                
                const user = JSON.parse(userData);
                if (user.password === password) {
                    this.currentUser = user;
                    const progress = localStorage.getItem(`progress_${login}`);
                    this.currentUser.completedTasks = progress ? JSON.parse(progress) : [];
                    this.saveCurrentUser();
                    this.showToast(`Добро пожаловать, ${login}!`, 'success');
                    this.showPage('main');
                } else {
                    this.showToast('Неверный пароль!', 'error');
                }
            },
            
            renderRegisterPage(container) {
                document.title = 'Регистрация - Лаборатория Курчатова';
                container.innerHTML = `
                    <div class="window">
                        <img class="background" src="${PATHS.bgLogin}" alt="Фон" onerror="this.style.display='none'">
                        <div class="form-container">
                            <h2>📝 Регистрация</h2>
                            <input type="text" id="regLoginInput" placeholder="Логин">
                            <input type="password" id="regPasswordInput" placeholder="Пароль">
                            <input type="password" id="regConfirmInput" placeholder="Подтвердите пароль">
                            <button class="btn-primary" onclick="App.register()">Зарегистрироваться</button>
                            <button class="btn-secondary" onclick="App.showPage('login')">Уже есть аккаунт</button>
                            <button class="btn-danger" onclick="App.showPage('main')">Назад</button>
                        </div>
                    </div>
                `;
            },
            
            register() {
                const login = document.getElementById('regLoginInput').value.trim();
                const password = document.getElementById('regPasswordInput').value;
                const confirm = document.getElementById('regConfirmInput').value;
                
                if (!login || !password) { this.showToast('Заполните все поля!', 'error'); return; }
                if (password !== confirm) { this.showToast('Пароли не совпадают!', 'error'); return; }
                if (localStorage.getItem(`user_${login}`)) { this.showToast('Пользователь уже существует!', 'error'); return; }
                
                const newUser = { login, password, registrationDate: new Date().toISOString(), avatarPath: null };
                localStorage.setItem(`user_${login}`, JSON.stringify(newUser));
                localStorage.setItem(`progress_${login}`, JSON.stringify([]));
                this.showToast('Регистрация успешна!', 'success');
                this.showPage('login');
            },
            
            renderTasksPage(container) {
                const completed = this.getCompletedCount();
                document.title = `Задания - ${this.currentUser ? this.currentUser.login + ` (${completed}/12)` : 'Войдите'}`;
                
                let tasksHtml = '';
                for (let i = 1; i <= 12; i++) {
                    const isCompleted = this.isTaskCompleted(i);
                    tasksHtml += `<div class="task-card ${isCompleted ? 'completed' : ''}" onclick="App.showPage('task', {taskId: ${i}})">
                        <div class="task-number">Задание ${i}</div>${isCompleted ? '<div class="check-mark">✓</div>' : ''}
                    </div>`;
                }
                
                container.innerHTML = `
                    <div class="window">
                        <img class="background" src="${PATHS.bgTasks}" alt="Фон" onerror="this.style.display='none'">
                        <div class="tasks-grid">${tasksHtml}</div>
                        <button class="back-btn" style="left: 20px; bottom: 20px; background-image: url('${PATHS.btnBack}')" onclick="App.showPage('main')"></button>
                    </div>
                `;
            },
            
            renderTaskPage(container, taskId) {
                const task = TASKS[taskId];
                if (!task) { this.showPage('tasks'); return; }
                
                const isCompleted = this.isTaskCompleted(taskId);
                container.innerHTML = `
                    <div class="window">
                        <img class="background" src="${PATHS.bgTask}" alt="Фон" onerror="this.style.display='none'">
                        <div class="task-container">
                            <div class="question-box"><strong>📌 Задание ${taskId}</strong><br><br>${task.question}</div>
                            <div class="answer-area">
                                <input type="text" id="answerInput" class="answer-input" placeholder="Введите ответ" ${isCompleted ? 'disabled' : ''}>
                                ${!isCompleted ? `<button class="check-btn" style="background-image: url('${PATHS.btnCheck}')" onclick="App.checkTask(${taskId})"></button>` : '<div class="completed-msg">✅ Задание выполнено!</div>'}
                            </div>
                            <button class="back-btn" style="left: 20px; top: 20px; background-image: url('${PATHS.btnBack}')" onclick="App.showPage('tasks')"></button>
                            ${taskId < 12 ? `<button class="next-btn" onclick="App.showPage('task', {taskId: ${taskId + 1}})">➡ Задание ${taskId + 1}</button>` : ''}
                        </div>
                    </div>
                `;
            },
            
            checkTask(taskId) {
                const answerInput = document.getElementById('answerInput');
                if (!answerInput) return;
                
                const userAnswer = answerInput.value.trim();
                const correctAnswer = TASKS[taskId].answer;
                const videoFolder = TASKS[taskId].videoFolder;
                
                if (!userAnswer) { this.showToast('Введите ответ!', 'error'); return; }
                
                if (userAnswer === correctAnswer) {
                    this.saveTaskProgress(taskId);
                    this.showToast('✅ Правильно!', 'success');
                    this.playVideo(videoFolder, 'верно');
                    this.showPage('task', {taskId: taskId});
                } else {
                    this.showToast(`❌ Неправильно. Ответ: ${correctAnswer}`, 'error');
                    this.playVideo(videoFolder, 'неверно');
                    answerInput.value = '';
                }
            },
            
            playVideo(folder, type) {
                const videoPath = `videos/${folder}/${type}.mp4`;
                const modal = document.createElement('div');
                modal.className = 'video-modal';
                modal.innerHTML = `
                    <button class="close-video" onclick="this.parentElement.remove()">✕ Закрыть</button>
                    <video autoplay controls><source src="${videoPath}" type="video/mp4">Видео не найдено</video>
                `;
                modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
                document.body.appendChild(modal);
                
                // Если видео не загрузилось, показываем сообщение
                const video = modal.querySelector('video');
                video.onerror = () => {
                    modal.innerHTML = `
                        <button class="close-video" onclick="this.parentElement.remove()">✕ Закрыть</button>
                        <div style="background:#333; padding:40px; border-radius:20px; text-align:center; color:white;">
                            <div style="font-size:48px;">${type === 'верно' ? '🎉' : '😢'}</div>
                            <div style="font-size:24px; margin-top:20px;">${type === 'верно' ? 'Правильно!' : 'Неправильно!'}</div>
                            <div style="margin-top:20px;">Видео не найдено: ${videoPath}</div>
                        </div>
                    `;
                };
            },
            
            renderLessonsPage(container) {
                const lessons = [
                    { id: 1, name: 'Кинематика', desc: 'v = s/t', completed: this.isTaskCompleted(1) },
                    { id: 2, name: 'Сила тяжести', desc: 'F = mg', completed: this.isTaskCompleted(2) },
                    { id: 3, name: 'Сила трения', desc: 'F = μN', completed: this.isTaskCompleted(3) },
                    { id: 4, name: 'Механическая работа', desc: 'A = F·s', completed: this.isTaskCompleted(4) }
                ];
                
                let lessonsHtml = '';
                for (const lesson of lessons) {
                    lessonsHtml += `
                        <div class="lesson-card ${lesson.completed ? 'completed' : ''}" onclick="App.showLesson(${lesson.id})">
                            <div style="font-size: 20px; font-weight: bold;">📖 Урок ${lesson.id}</div>
                            <div style="font-size: 16px;">${lesson.name}</div>
                            <div style="font-size: 12px;">${lesson.desc}</div>
                            ${lesson.completed ? '<div class="check-mark">✓</div>' : ''}
                        </div>
                    `;
                }
                
                container.innerHTML = `
                    <div class="window">
                        <img class="background" src="${PATHS.bgTask}" alt="Фон" onerror="this.style.display='none'">
                        <div class="lessons-grid">${lessonsHtml}</div>
                        <button class="back-btn" style="left: 20px; bottom: 20px; background-image: url('${PATHS.btnBack}')" onclick="App.showPage('main')"></button>
                    </div>
                `;
            },
            
            showLesson(lessonId) {
                const content = {
                    1: '📖 Кинематика\n\nРаздел механики, изучающий движение тел без учёта причин.\n\nФормулы:\n• v = s/t (скорость)\n• s = v·t (путь)\n• t = s/v (время)',
                    2: '📖 Сила тяжести\n\nСила, с которой Земля притягивает тела.\n\nФормула: F = mg\nгде g = 10 м/с²',
                    3: '📖 Сила трения\n\nСила, возникающая при движении одного тела по поверхности другого.\n\nФормула: Fтр = μN\nДля горизонтальной поверхности: Fтр = μmg',
                    4: '📖 Механическая работа\n\nФизическая величина, равная произведению силы на перемещение.\n\nФормула: A = F·s\nЕдиница измерения: Джоуль (Дж)'
                };
                alert(content[lessonId] || `📖 Урок ${lessonId}\n\nМатериал в разработке`);
            },
            
            renderProfilePage(container) {
                if (!this.currentUser) { this.showPage('login'); return; }
                
                const completed = this.getCompletedCount();
                const percent = (completed / 12) * 100;
                let medalImg = '';
                if (completed >= 9) medalImg = PATHS.goldMedal;
                else if (completed >= 5) medalImg = PATHS.silverMedal;
                else if (completed >= 1) medalImg = PATHS.bronzeMedal;
                
                container.innerHTML = `
                    <div class="window">
                        <img class="background" src="${PATHS.bgLogin}" alt="Фон" onerror="this.style.display='none'">
                        <div class="profile-container">
                            <div class="profile-avatar" onclick="App.changeAvatar()">
                                ${this.currentUser.avatarPath ? `<img src="${this.currentUser.avatarPath}">` : '👤'}
                            </div>
                            <div class="profile-info">
                                <h3>👋 ${this.currentUser.login}</h3>
                                <p>📅 Зарегистрирован: ${new Date(this.currentUser.registrationDate).toLocaleDateString()}</p>
                                <p>📊 Прогресс: ${completed}/12 (${Math.round(percent)}%)</p>
                                <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%"></div></div>
                                <div class="achievement">${medalImg ? `<img src="${medalImg}"><br><span style="font-size:12px;">Достижение</span>` : '<div>📘 Нет достижений</div>'}</div>
                                <div class="profile-buttons">
                                    <button class="btn-primary" onclick="App.showPage('tasks')">📋 Задания</button>
                                    <button class="btn-secondary" onclick="App.showPage('main')">🏠 Главная</button>
                                    <button class="btn-danger" onclick="App.logout()">🚪 Выйти</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },
            
            changeAvatar() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            this.currentUser.avatarPath = event.target.result;
                            this.saveCurrentUser();
                            this.showPage('profile');
                            this.showToast('Аватарка обновлена!', 'success');
                        };
                        reader.readAsDataURL(file);
                    }
                };
                input.click();
            },
            
            renderUsersPage(container) {
                const users = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith('user_')) {
                        const user = JSON.parse(localStorage.getItem(key));
                        const progress = localStorage.getItem(`progress_${user.login}`);
                        user.completedCount = progress ? JSON.parse(progress).length : 0;
                        users.push(user);
                    }
                }
                
                let usersHtml = '';
                for (const user of users) {
                    const isSelected = this.selectedUser && this.selectedUser.login === user.login;
                    usersHtml += `<tr class="user-row ${isSelected ? 'selected' : ''}" onclick="App.selectUser('${user.login}')">
                        <td>${user.login}</td>
                        <td>${new Date(user.registrationDate).toLocaleDateString()}</td>
                        <td>${user.completedCount}/12</td>
                    </tr>`;
                }
                
                container.innerHTML = `
                    <div class="window">
                        <img class="background" src="${PATHS.bgLogin}" alt="Фон" onerror="this.style.display='none'">
                        <div class="current-user-panel">
                            <h3>👤 Текущий</h3>
                            <p>${this.currentUser ? this.currentUser.login : 'Не авторизован'}</p>
                            <p>${this.currentUser ? this.getCompletedCount() + '/12' : ''}</p>
                            ${this.currentUser ? '<button onclick="App.showPage(\'profile\')">📱 Профиль</button>' : '<button onclick="App.showPage(\'login\')">🔐 Войти</button>'}
                        </div>
                        <div class="users-table">
                            <h3 style="padding:10px; background:#333; margin:0;">📋 Пользователи</h3>
                            <table style="width:100%"><thead><tr><th>Логин</th><th>Дата</th><th>Прогресс</th></tr></thead><tbody>${usersHtml}</tbody></table>
                        </div>
                        ${this.selectedUser && (!this.currentUser || this.selectedUser.login !== this.currentUser.login) ? 
                            `<button class="delete-user-btn" onclick="App.deleteSelectedUser()">🗑 Удалить</button>` : ''}
                        <button class="back-btn" style="left:20px;bottom:20px;background-image:url('${PATHS.btnBack}')" onclick="App.showPage('main')"></button>
                    </div>
                `;
            },
            
            selectUser(login) {
                const userData = localStorage.getItem(`user_${login}`);
                if (userData) {
                    this.selectedUser = JSON.parse(userData);
                    this.renderUsersPage(document.getElementById('app'));
                }
            },
            
            deleteSelectedUser() {
                if (!this.selectedUser) return;
                if (confirm(`Удалить пользователя "${this.selectedUser.login}"?`)) {
                    localStorage.removeItem(`user_${this.selectedUser.login}`);
                    localStorage.removeItem(`progress_${this.selectedUser.login}`);
                    this.selectedUser = null;
                    this.renderUsersPage(document.getElementById('app'));
                    this.showToast('Пользователь удалён', 'success');
                }
            },
            
            showToast(text, type) {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerText = text;
                document.body.appendChild(toast);
                setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2000);
            },
            
            logout() {
                this.currentUser = null;
                localStorage.removeItem('currentUser');
                this.showToast('Вы вышли из системы', 'success');
                this.showPage('main');
            }
        };

        // Запуск
        window.App = App;
        App.init();
    </script>
</body>
</html>
