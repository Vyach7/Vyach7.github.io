<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Лаборатория Курчатова - Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #1a1a2e;
        }

        .viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* Стили для страницы входа */
        .login-container {
            position: absolute;
            left: 5%;
            top: 50%;
            transform: translateY(-50%);
            padding: 40px;
            border-radius: 20px;
            width: 40%;
            max-width: 450px;
            z-index: 10;
        }

        .login-container h2 {
            color: white;
            margin-bottom: 30px;
            font-size: 28px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: white;
            margin-bottom: 8px;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background: white;
            color: #333;
        }

        .buttons-container {
            position: absolute;
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 40px;
            z-index: 10;
            width: 25%;
            max-width: 280px;
        }

        .action-img-btn {
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
            border: none;
            background: transparent;
            width: 100%;
        }

        .action-img-btn img {
            width: 100%;
            height: auto;
            display: block;
        }

        .btn-register-large {
            transform: scaleY(2);
            transform-origin: center;
        }

        .action-img-btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        /* Стили для страницы регистрации */
        .register-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            z-index: 10;
        }

        .register-container h2 {
            color: white;
            margin-bottom: 30px;
            font-size: 28px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .register-container .input-group {
            text-align: left;
        }

        .register-container .input-group label {
            display: block;
            color: white;
            margin-bottom: 8px;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .register-container .input-group input {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background: white;
            color: #333;
        }

        .register-img-btn {
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
            border: none;
            background: transparent;
            margin-top: 20px;
            width: 100%;
            max-width: 280px;
        }

        .register-img-btn img {
            width: 100%;
            height: auto;
        }

        .back-to-login {
            margin-top: 20px;
            background: rgba(0,0,0,0.6);
            color: white !important;
            border: 1px solid white !important;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        /* Стили для основного интерфейса */
        .ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .diamond-btn {
            position: absolute;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: none;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .diamond-btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        .back-btn {
            position: absolute;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            border: none;
        }
        .back-btn:active {
            transform: scale(0.97);
            opacity: 0.8;
        }

        .btn-users {
            left: 15.875%;
            top: 66.444%;
            width: 18.75%;
            aspect-ratio: 150 / 100;
        }
        .btn-lessons {
            left: 39.5%;
            top: 66.444%;
            width: 18.75%;
            aspect-ratio: 150 / 100;
        }
        .btn-tasks {
            left: 60.75%;
            top: 66.444%;
            width: 18.75%;
            aspect-ratio: 150 / 100;
        }

        /* Стили для заданий */
        .tasks-container {
            position: absolute;
            left: 5%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .task-btn {
            width: 200px;
            height: 200px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            border: none;
            background-color: transparent;
        }
        .task-btn:active {
            transform: scale(0.95);
            opacity: 0.9;
        }

        .question-box {
            position: absolute;
            left: 5%;
            top: 10%;
            width: 28%;
            color: white;
            font-size: 16px;
            line-height: 1.6;
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 10px;
            z-index: 10;
        }
        
        .task-number-image {
            position: absolute;
            left: 34%;
            top: 10%;
            width: 51%;
            max-width: 700px;
            z-index: 10;
        }
        
        .task-number-image img {
            width: 100%;
            height: auto;
        }
        
        .answer-area {
            position: absolute;
            left: 5%;
            bottom: 15%;
            z-index: 10;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .answer-input {
            width: 280px;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 8px;
            background: white;
        }
        .check-btn {
            width: 140px;
            height: 55px;
            background-size: cover;
            cursor: pointer;
            border: none;
        }
        .next-task-btn {
            position: absolute;
            right: 2%;
            bottom: 8%;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 200px;
            z-index: 15;
        }
        .next-task-btn img {
            width: 100%;
            height: auto;
        }
        .next-task-btn:active {
            transform: scale(0.95);
            opacity: 0.9;
        }
        .completed-msg { font-size: 18px; color: #43e97b; margin-top: 10px; font-weight: bold; }

        .back-btn-task {
            width: 174px !important;
            height: 106px !important;
        }

        .back-btn-tasks-mobile {
            display: none;
            position: absolute;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            border: none;
            z-index: 15;
        }

        /* Стили для уроков */
        .lesson-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .lesson-image {
            max-width: 90%;
            max-height: 70%;
            object-fit: contain;
        }

        .lesson-navigation {
            display: flex;
            gap: 50px;
            margin-top: 20px;
            z-index: 20;
        }

        .lesson-nav-btn {
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
            border: none;
            background: transparent;
            width: 100px;
        }

        .lesson-nav-btn img {
            width: 100%;
            height: auto;
        }

        .lesson-nav-btn:active {
            transform: scale(0.95);
            opacity: 0.9;
        }

        .lesson-back-btn-pc {
            position: absolute;
            left: 20px;
            bottom: 20px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            border: none;
            width: 87px;
            height: 53px;
            z-index: 20;
        }

        .lesson-back-btn-pc:active {
            transform: scale(0.97);
            opacity: 0.8;
        }

        .video-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-modal video { max-width: 90%; max-height: 90%; }
        .close-video {
            position: absolute;
            top: 20px;
            right: 20px;
            background: red;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            border: none;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 3000;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        .toast.success { background: #43e97b; color: #1a1a2e; }
        .toast.error { background: #f5576c; color: white; }

        /* Адаптив для мобильных устройств */
        @media (max-width: 768px) {
            .login-container { width: 90%; left: 5%; right: 5%; padding: 30px; }
            .buttons-container { position: relative; right: auto; left: 50%; transform: translateX(-50%); top: auto; margin-top: 20px; flex-direction: row; width: 80%; gap: 20px; }
            .action-img-btn { width: 45%; }
            .register-container { width: 95%; padding: 15px; }
            .register-img-btn { max-width: 180px; margin-top: 10px; }
            .back-to-login { margin-top: 10px; padding: 8px 15px; font-size: 14px; }
            
            .btn-users, .btn-lessons, .btn-tasks { width: 28%; top: 60%; }
            .btn-users { left: 5%; }
            .btn-lessons { left: 36%; }
            .btn-tasks { left: 67%; }
            
            .tasks-container { left: 50%; transform: translateX(-50%) translateY(-50%); flex-direction: column; align-items: center; gap: 15px; }
            .task-btn { width: 150px; height: 150px; }
            
            .question-box { width: 90%; left: 5%; top: 8%; font-size: 13px; padding: 12px; }
            .task-number-image { width: 70%; left: 15%; top: 38%; }
            .answer-area { left: 5%; bottom: 22%; }
            .answer-input { width: 150px; padding: 10px; }
            .check-btn { width: 100px; height: 45px; background-size: contain; background-repeat: no-repeat; }
            .next-task-btn { bottom: 5%; right: 2%; width: 120px; }
            
            .back-btn-task { width: 130px !important; height: 80px !important; }
            
            .back-btn-tasks-mobile {
                display: block;
                left: 10px;
                top: 10px;
                width: 87px;
                height: 53px;
            }

            .lesson-image {
                max-width: 95%;
                max-height: 50%;
            }

            .lesson-navigation {
                gap: 30px;
                margin-top: 15px;
            }
            .lesson-nav-btn { width: 80px; }

            .lesson-back-btn-pc {
                top: 20px;
                left: 20px;
                bottom: auto;
                width: 100px;
                height: 60px;
            }
        }

        @media (max-width: 480px) {
            .task-btn { width: 100px; height: 100px; }
            .question-box { width: 90%; left: 5%; top: 12%; font-size: 11px; padding: 10px; }
            .task-number-image { width: 65%; left: 17%; top: 36%; }
            .answer-area { left: 5%; bottom: 25%; gap: 10px; }
            .answer-input { width: 130px; padding: 8px; font-size: 14px; }
            .check-btn { width: 80px; height: 40px; }
            .next-task-btn { width: 100px; }
            .back-btn-task { width: 110px !important; height: 67px !important; }
            .back-btn-tasks-mobile { left: 5px; top: 5px; width: 70px; height: 42px; }
            .lesson-navigation { gap: 20px; }
            .lesson-nav-btn { width: 70px; }
            .lesson-image { max-height: 45%; }
            .lesson-back-btn-pc { width: 80px; height: 50px; top: 15px; left: 15px; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ============ КОНФИГУРАЦИЯ ============
        const PATHS = {
            bgMain: 'images/image (6).jpeg',
            bgLogin: 'images/image (6).jpeg',
            bgTasks: 'images/закат.png',
            bgTask: 'images/image (4).jpeg',
            btnUsers: 'images/acetone-2025128-202148-786.png',
            btnLessons: 'images/acetone-2025128-202110-537.png',
            btnTasks: 'images/acetone-2025128-202348-996.png',
            btnBack: 'images/кнопка вернуться (1).png',
            btnCheck: 'images/acetone-20251216-7246-722.png',
            btnLogin: 'images/вход.png',
            btnRegister: 'images/регистрация.png',
            btnAddUser: 'images/добавить пользователя.png',
            btnNext: 'images/след.png',
            btnPrev: 'images/назад.png',
            btnForward: 'images/вперёд.png',
            taskNumbers: {
                1: 'images/первая.png',
                2: 'images/вторая.png',
                3: 'images/третья.png',
                4: 'images/четвёртая.png'
            },
            bronzeMedal: 'images/бронза.png',
            silverMedal: 'images/серебро.png',
            goldMedal: 'images/золото.png',
            taskNotCompleted: {
                1: 'images/неготово1.png',
                2: 'images/неготово2.png',
                3: 'images/неготово3.png',
                4: 'images/неготово4.png'
            },
            taskCompleted: {
                1: 'images/Задание1.png',
                2: 'images/Задание2.png',
                3: 'images/Задание3.png',
                4: 'images/Задание4.png'
            },
            lessonBackgrounds: {
                1: 'images/урок кинематика.png',
                2: 'images/урок сила тяжести.png',
                3: 'images/урок сила трения.png',
                4: 'images/урок работа.png'
            }
        };

        // ============ ЗАДАНИЯ ============
        const TASKS = {
            1: { question: "Кролик бежит в норку. Ему осталось бежать 240 метров, его скорость 16 метров в секунду. Рассчитайте время, за которое кролик добежит до норки.", answer: "15", videoFolder: "N1video" },
            2: { question: "Баскетболист тренируется и подбрасывает мяч вверх. Определите массу мяча, если сила тяжести равна 50 Н (ускорение свободного падения примите за 10).", answer: "5", videoFolder: "N2video" },
            3: { question: "Водитель автобуса едет поздно ночью по дороге и не замечает впереди стоящую машину. Вычислите коэффициент трения, если Fтр = 2000 кН, а масса автобуса равна 50 т (g = 10).", answer: "4", videoFolder: "N3video" },
            4: { question: "Строительный кран поднимает груз. Определите работу, совершаемую краном, если сила равна 4000 Н, а расстояние, на которое поднимают груз, равно 10 метров.", answer: "40000", videoFolder: "N4video" }
        };

        // ============ УРОКИ ============
        const LESSON_NAMES = {
            1: "Кинематика",
            2: "Сила тяжести",
            3: "Сила трения",
            4: "Работа"
        };

        // ============ ПРИЛОЖЕНИЕ ============
        const App = {
            currentUser: null,
            currentLesson: 1,
            init() { 
                this.loadCurrentUser(); 
                this.showPage('login');
            },
            loadCurrentUser() {
                const saved = localStorage.getItem('LaboratoriaKurchatova_currentUser');
                if (saved) {
                    this.currentUser = JSON.parse(saved);
                    const progress = localStorage.getItem(`LaboratoriaKurchatova_progress_${this.currentUser.login}`);
                    this.currentUser.completedTasks = progress ? JSON.parse(progress) : [];
                }
            },
            saveCurrentUser() {
                if (this.currentUser) {
                    localStorage.setItem('LaboratoriaKurchatova_currentUser', JSON.stringify(this.currentUser));
                    localStorage.setItem(`LaboratoriaKurchatova_progress_${this.currentUser.login}`, JSON.stringify(this.currentUser.completedTasks));
                }
            },
            saveTaskProgress(taskNumber) {
                if (!this.currentUser) return false;
                if (!this.currentUser.completedTasks.includes(taskNumber)) {
                    this.currentUser.completedTasks.push(taskNumber);
                    this.saveCurrentUser();
                    return true;
                }
                return false;
            },
            isTaskCompleted(taskNumber) { return this.currentUser && this.currentUser.completedTasks.includes(taskNumber); },
            getCompletedCount() { return this.currentUser ? this.currentUser.completedTasks.length : 0; },
            showPage(page, params = {}) {
                const appDiv = document.getElementById('app');
                switch(page) {
                    case 'login': this.renderLoginPage(appDiv); break;
                    case 'register': this.renderRegisterPage(appDiv); break;
                    case 'main': this.renderMainPage(appDiv); break;
                    case 'tasks': this.renderTasksPage(appDiv); break;
                    case 'lessons': this.renderLessonPage(appDiv, this.currentLesson); break;
                    case 'profile': this.renderProfilePage(appDiv); break;
                    case 'task': this.renderTaskPage(appDiv, params.taskId); break;
                    default: this.renderLoginPage(appDiv);
                }
            },
            // ============ СТРАНИЦА ВХОДА ============
            renderLoginPage(container) {
                document.title = 'Вход - Лаборатория Курчатова';
                container.innerHTML = `
                    <div class="viewport">
                        <img class="background" src="${PATHS.bgLogin}" onerror="this.style.display='none'">
                        <div class="login-container">
                            <h2>Вход в систему</h2>
                            <div class="input-group">
                                <label>Логин</label>
                                <input type="text" id="loginInput" placeholder="Введите ваш логин">
                            </div>
                            <div class="input-group">
                                <label>Пароль</label>
                                <input type="password" id="passwordInput" placeholder="Введите пароль">
                            </div>
                        </div>
                        <div class="buttons-container">
                            <button class="action-img-btn" onclick="App.handleLogin()">
                                <img src="${PATHS.btnLogin}" alt="Вход">
                            </button>
                            <button class="action-img-btn btn-register-large" onclick="App.showPage('register')">
                                <img src="${PATHS.btnRegister}" alt="Регистрация">
                            </button>
                        </div>
                    </div>
                `;
            },
            handleLogin() {
                const login = document.getElementById('loginInput').value.trim();
                const password = document.getElementById('passwordInput').value;
                if (!login || !password) { 
                    this.showToast('Введите логин и пароль!', 'error'); 
                    return; 
                }
                const userData = localStorage.getItem(`LaboratoriaKurchatova_user_${login}`);
                if (!userData) { 
                    this.showToast('Пользователь не найден! Перейдите к регистрации.', 'error'); 
                    return; 
                }
                const user = JSON.parse(userData);
                if (user.password === password) {
                    this.currentUser = user;
                    const progress = localStorage.getItem(`LaboratoriaKurchatova_progress_${login}`);
                    this.currentUser.completedTasks = progress ? JSON.parse(progress) : [];
                    this.saveCurrentUser();
                    this.showToast(`Добро пожаловать, ${login}!`, 'success');
                    this.showPage('main');
                } else { 
                    this.showToast('Неверный пароль!', 'error'); 
                }
            },
            // ============ СТРАНИЦА РЕГИСТРАЦИИ ============
            renderRegisterPage(container) {
                document.title = 'Регистрация - Лаборатория Курчатова';
                container.innerHTML = `
                    <div class="viewport">
                        <img class="background" src="${PATHS.bgLogin}" onerror="this.style.display='none'">
                        <div class="register-container">
                            <h2>Создание аккаунта</h2>
                            <div class="input-group">
                                <label>Введите логин</label>
                                <input type="text" id="regLoginInput" placeholder="Придумайте логин">
                            </div>
                            <div class="input-group">
                                <label>Придумайте пароль</label>
                                <input type="password" id="regPasswordInput" placeholder="Пароль">
                            </div>
                            <div class="input-group">
                                <label>Подтвердите пароль</label>
                                <input type="password" id="regConfirmInput" placeholder="Повторите пароль">
                            </div>
                            <button class="register-img-btn" onclick="App.handleRegister()">
                                <img src="${PATHS.btnAddUser}" alt="Добавить пользователя">
                            </button>
                            <button class="back-to-login" onclick="App.showPage('login')">Назад ко входу</button>
                        </div>
                    </div>
                `;
            },
            handleRegister() {
                const login = document.getElementById('regLoginInput').value.trim();
                const password = document.getElementById('regPasswordInput').value;
                const confirm = document.getElementById('regConfirmInput').value;
                if (!login || !password) { 
                    this.showToast('Заполните все поля!', 'error'); 
                    return; 
                }
                if (password !== confirm) { 
                    this.showToast('Пароли не совпадают!', 'error'); 
                    return; 
                }
                if (localStorage.getItem(`LaboratoriaKurchatova_user_${login}`)) { 
                    this.showToast('Пользователь уже существует!', 'error'); 
                    return; 
                }
                const newUser = { login, password, registrationDate: new Date().toISOString(), avatarPath: null };
                localStorage.setItem(`LaboratoriaKurchatova_user_${login}`, JSON.stringify(newUser));
                localStorage.setItem(`LaboratoriaKurchatova_progress_${login}`, JSON.stringify([]));
                this.showToast('Регистрация успешна! Теперь войдите.', 'success');
                this.showPage('login');
            },
            // ============ ГЛАВНОЕ МЕНЮ ============
            renderMainPage(container) {
                const completed = this.getCompletedCount();
                document.title = this.currentUser ? `Курчатова - ${this.currentUser.login} (${completed}/4)` : 'Лаборатория Курчатова';
                container.innerHTML = `
                    <div class="viewport">
                        <img class="background" src="${PATHS.bgMain}" onerror="this.style.display='none'">
                        <div class="ui-container">
                            <button class="diamond-btn btn-users" style="background-image: url('${PATHS.btnUsers}')" onclick="App.showPage('profile')"></button>
                            <button class="diamond-btn btn-lessons" style="background-image: url('${PATHS.btnLessons}')" onclick="App.startLessons()"></button>
                            <button class="diamond-btn btn-tasks" style="background-image: url('${PATHS.btnTasks}')" onclick="App.showPage('tasks')"></button>
                        </div>
                    </div>
                `;
            },
            startLessons() {
                this.currentLesson = 1;
                this.showPage('lessons');
            },
            // ============ УРОКИ ============
            renderLessonPage(container, lessonId) {
                let backgroundImage = PATHS.lessonBackgrounds[lessonId];
                const hasPrev = lessonId > 1;
                const hasNext = lessonId < 4;
                const lessonName = LESSON_NAMES[lessonId];
                container.innerHTML = `
                    <div class="viewport">
                        <img class="background" src="${PATHS.bgTask}" onerror="this.style.display='none'">
                        <div class="lesson-content">
                            <img src="${backgroundImage}" alt="${lessonName}" class="lesson-image" onerror="this.style.display='none'">
                            <div class="lesson-navigation">
                                ${hasPrev ? `<button class="lesson-nav-btn" onclick="App.prevLesson()"><img src="${PATHS.btnPrev}" alt="Назад"></button>` : '<div style="width:100px;"></div>'}
                                ${hasNext ? `<button class="lesson-nav-btn" onclick="App.nextLesson()"><img src="${PATHS.btnForward}" alt="Вперёд"></button>` : '<div style="width:100px;"></div>'}
                            </div>
                        </div>
                        <button class="lesson-back-btn-pc" style="background-image:url('${PATHS.btnBack}');" onclick="App.showPage('main')"></button>
                    </div>
                `;
            },
            nextLesson() {
                if (this.currentLesson < 4) {
                    this.currentLesson++;
                    this.showPage('lessons');
                }
            },
            prevLesson() {
                if (this.currentLesson > 1) {
                    this.currentLesson--;
                    this.showPage('lessons');
                }
            },
            // ============ ЗАДАНИЯ ============
            renderTasksPage(container) {
                let tasksHtml = '';
                for (let i = 1; i <= 4; i++) {
                    const isCompleted = this.isTaskCompleted(i);
                    let imgUrl;
                    if (isCompleted) {
                        imgUrl = PATHS.taskCompleted[i];
                    } else {
                        imgUrl = PATHS.taskNotCompleted[i];
                    }
                    tasksHtml += `<button class="task-btn" style="background-image: url('${imgUrl}');" onclick="App.showPage('task', {taskId: ${i}})"></button>`;
                }
                container.innerHTML = `
                    <div class="viewport">
                        <img class="background" src="${PATHS.bgTasks}" onerror="this.style.display='none'">
                        <div class="tasks-container">${tasksHtml}</div>
                        <button class="back-btn" style="position:absolute; left:20px; bottom:20px; width:87px; height:53px; background-image:url('${PATHS.btnBack}'); background-size:contain; background-repeat:no-repeat; background-position:center; border:none; cursor:pointer;" onclick="App.showPage('main')"></button>
                        <button class="back-btn-tasks-mobile" style="background-image:url('${PATHS.btnBack}');" onclick="App.showPage('main')"></button>
                    </div>
                `;
            },
            renderTaskPage(container, taskId) {
                const task = TASKS[taskId];
                if (!task) { this.showPage('tasks'); return; }
                const isCompleted = this.isTaskCompleted(taskId);
                
                container.innerHTML = `
                    <div class="viewport">
                        <img class="background" src="${PATHS.bgTask}" onerror="this.style.display='none'">
                        <div class="question-box"><strong>Задание ${taskId}</strong><br><br>${task.question}</div>
                        <div class="task-number-image">
                            <img src="${PATHS.taskNumbers[taskId]}" alt="Задание ${taskId}">
                        </div>
                        <div class="answer-area">
                            <input type="text" id="answerInput" class="answer-input" placeholder="Ответ">
                            <button class="check-btn" style="background-image: url('${PATHS.btnCheck}'); background-size:cover;" onclick="App.checkTask(${taskId})"></button>
                        </div>
                        ${isCompleted ? '<div class="completed-msg" style="position:absolute; left:5%; bottom:8%;">Задание выполнено!</div>' : ''}
                        <button class="back-btn back-btn-task" style="position:absolute; left:20px; top:20px; background-image:url('${PATHS.btnBack}'); background-size:contain; background-repeat:no-repeat; background-position:center; border:none; cursor:pointer;" onclick="App.showPage('tasks')"></button>
                        ${taskId < 4 ? `<button class="next-task-btn" onclick="App.showPage('task', {taskId: ${taskId + 1}})"><img src="${PATHS.btnNext}" alt="След"></button>` : ''}
                    </div>
                `;
            },
            checkTask(taskId) {
                const answerInput = document.getElementById('answerInput');
                if (!answerInput) return;
                const userAnswer = answerInput.value.trim();
                const correctAnswer = TASKS[taskId].answer;
                const videoFolder = TASKS[taskId].videoFolder;
                if (!userAnswer) { this.showToast('Введите ответ!', 'error'); return; }
                if (userAnswer === correctAnswer) {
                    const wasCompleted = this.isTaskCompleted(taskId);
                    if (!wasCompleted) {
                        this.saveTaskProgress(taskId);
                        this.showToast('Правильно! Задание засчитано!', 'success');
                    } else {
                        this.showToast('Правильно! (задание уже было выполнено)', 'success');
                    }
                    this.playVideo(videoFolder, 'верно');
                    setTimeout(() => {
                        this.showPage('tasks');
                    }, 500);
                } else {
                    this.showToast('Неправильно. Попробуйте ещё раз!', 'error');
                    this.playVideo(videoFolder, 'неверно');
                    answerInput.value = '';
                }
            },
            playVideo(folder, type) {
                const videoPath = `videos/${folder}/${type}.mp4`;
                const modal = document.createElement('div');
                modal.className = 'video-modal';
                modal.innerHTML = `<button class="close-video" onclick="this.parentElement.remove()">Закрыть</button><video autoplay controls><source src="${videoPath}" type="video/mp4">Видео не найдено</video>`;
                modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
                document.body.appendChild(modal);
                const video = modal.querySelector('video');
                video.onerror = () => {
                    modal.innerHTML = `<button class="close-video" onclick="this.parentElement.remove()">Закрыть</button><div style="color:white; text-align:center; padding:40px; background:#333; border-radius:20px;"><div style="font-size:48px;">${type === 'верно' ? 'Правильно!' : 'Неправильно!'}</div><div style="margin-top:20px;">Видео не найдено: ${videoPath}</div></div>`;
                };
            },
            // ============ ПРОФИЛЬ ============
            renderProfilePage(container) {
                if (!this.currentUser) { this.showPage('login'); return; }
                const completed = this.getCompletedCount();
                const percent = (completed / 4) * 100;
                let medalImg = '';
                if (completed >= 4) medalImg = PATHS.goldMedal;
                else if (completed >= 2) medalImg = PATHS.silverMedal;
                else if (completed >= 1) medalImg = PATHS.bronzeMedal;
                container.innerHTML = `
                    <div class="viewport">
                        <img class="background" src="${PATHS.bgLogin}" onerror="this.style.display='none'">
                        <div class="profile-container">
                            <div class="profile-avatar" onclick="App.changeAvatar()">${this.currentUser.avatarPath ? `<img src="${this.currentUser.avatarPath}" style="width:100%;height:100%;object-fit:cover;">` : '👤'}</div>
                            <h3>${this.currentUser.login}</h3>
                            <p>${new Date(this.currentUser.registrationDate).toLocaleDateString()}</p>
                            <p>Прогресс: ${completed}/4 (${Math.round(percent)}%)</p>
                            <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                            <div class="achievement">${medalImg ? `<img src="${medalImg}" width="80">` : 'Нет достижений'}</div>
                            <div class="profile-buttons">
                                <button class="btn-primary" onclick="App.showPage('tasks')">Задания</button>
                                <button class="btn-secondary" onclick="App.showPage('main')">Главная</button>
                                <button class="btn-danger" onclick="App.logout()">Выйти</button>
                            </div>
                        </div>
                    </div>
                `;
            },
            changeAvatar() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            this.currentUser.avatarPath = event.target.result;
                            this.saveCurrentUser();
                            this.showPage('profile');
                            this.showToast('Аватар обновлён', 'success');
                        };
                        reader.readAsDataURL(file);
                    }
                };
                input.click();
            },
            showToast(text, type) {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerText = text;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            },
            logout() {
                this.currentUser = null;
                localStorage.removeItem('LaboratoriaKurchatova_currentUser');
                this.showToast('Вы вышли из системы', 'success');
                this.showPage('login');
            }
        };

        App.init();
    </script>
</body>
</html>
