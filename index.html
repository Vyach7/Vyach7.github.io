<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Лаборатория Курчатова</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #1a1a2e;
        }

        /* Главный контейнер с сохранением пропорций 800:450 (как в WPF) */
        .viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            overflow: hidden;
        }

        /* Контент масштабируется относительно ширины/высоты окна */
        .content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Сохраняем пропорции 800x450, но заполняем экран */
            object-fit: contain;
        }

        /* Фон растягивается на весь экран */
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* Контейнер для всех элементов интерфейса (относительные координаты) */
        .ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* Базовые стили для кнопок */
        .diamond-btn {
            position: absolute;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
            background-size: cover;
            background-position: center;
            border: none;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .diamond-btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        .back-btn {
            position: absolute;
            cursor: pointer;
            background-size: cover;
            border: none;
        }
        .back-btn:active {
            opacity: 0.8;
            transform: scale(0.97);
        }

        /* Координаты и размеры задаются в процентах от родителя */
        /* Исходные размеры в WPF: ширина 800, высота 450 */
        /* Пересчитываем в проценты: left% = left_px / 800 * 100, top% = top_px / 450 * 100, width% = width_px / 800 * 100, height% = height_px / 450 * 100 */

        /* Кнопка "Пользователи" (127, 299, 150x100) */
        .btn-users {
            left: 15.875%;    /* 127/800 */
            top: 66.444%;     /* 299/450 */
            width: 18.75%;    /* 150/800 */
            height: 22.222%;  /* 100/450 */
        }

        /* Кнопка "Уроки" (316, 299, 150x100) */
        .btn-lessons {
            left: 39.5%;      /* 316/800 */
            top: 66.444%;
            width: 18.75%;
            height: 22.222%;
        }

        /* Кнопка "Задания" (486, 299, 150x100) */
        .btn-tasks {
            left: 60.75%;     /* 486/800 */
            top: 66.444%;
            width: 18.75%;
            height: 22.222%;
        }

        /* Кнопка "Назад" (Profile) (686, 400, 87x53) */
        .btn-profile {
            left: 85.75%;     /* 686/800 */
            top: 88.888%;     /* 400/450 */
            width: 10.875%;   /* 87/800 */
            height: 11.777%;  /* 53/450 */
        }

        /* Адаптация для мобильных устройств: увеличиваем размеры кнопок */
        @media (max-width: 768px) {
            .btn-users, .btn-lessons, .btn-tasks {
                width: 25%;
                height: auto;
                aspect-ratio: 150 / 100;
            }
            .btn-profile {
                width: 15%;
                height: auto;
                aspect-ratio: 87 / 53;
            }
            /* Корректируем позиции на мобильных */
            .btn-users { left: 8%; top: 65%; }
            .btn-lessons { left: 37%; top: 65%; }
            .btn-tasks { left: 66%; top: 65%; }
            .btn-profile { left: 80%; top: 85%; }
        }

        /* Остальные стили (формы, сетка заданий и т.д.) остаются как были, но тоже адаптивны */
        .form-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 5%;
            border-radius: 20px;
            min-width: 280px;
            width: 80%;
            max-width: 400px;
            text-align: center;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .form-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .form-container button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .tasks-grid {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 130px));
            gap: 20px;
            justify-content: center;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }

        .task-card {
            aspect-ratio: 130 / 90;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            position: relative;
            transition: transform 0.1s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .question-box {
            position: absolute;
            left: 10%;
            top: 20%;
            width: 35%;
            color: white;
            font-size: clamp(12px, 2vw, 16px);
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 10px;
            z-index: 10;
        }

        .answer-area {
            position: absolute;
            left: 8%;
            bottom: 15%;
            z-index: 10;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .answer-input {
            width: 250px;
            padding: 10px;
            font-size: 14px;
            border: 2px solid #667eea;
            border-radius: 8px;
        }

        .check-btn {
            width: 120px;
            height: 50px;
            background-size: cover;
            cursor: pointer;
            border: none;
        }

        .next-btn {
            position: absolute;
            right: 5%;
            bottom: 5%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            border: none;
        }

        /* Адаптив для страницы задания */
        @media (max-width: 768px) {
            .question-box {
                width: 80%;
                left: 10%;
                top: 10%;
                font-size: 14px;
            }
            .answer-area {
                left: 10%;
                bottom: 10%;
                flex-direction: column;
                align-items: flex-start;
            }
            .check-btn {
                margin-top: 10px;
            }
            .next-btn {
                bottom: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }

        /* Остальные стили (профиль, таблица пользователей, уроки) — они уже были адаптивны, оставим как есть */
        /* (здесь продолжение предыдущих стилей, но они не менялись) */
        .profile-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            z-index: 10;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            cursor: pointer;
            overflow: hidden;
        }
        .users-table {
            position: absolute;
            right: 5%;
            top: 20%;
            width: 90%;
            max-width: 400px;
            background: rgba(0,0,0,0.9);
            border-radius: 10px;
            overflow-x: auto;
        }
        .current-user-panel {
            position: absolute;
            left: 5%;
            top: 20%;
            background: rgba(0,0,0,0.85);
            padding: 15px;
            border-radius: 10px;
            color: white;
            min-width: 200px;
            max-width: 280px;
        }
        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 220px));
            gap: 20px;
            justify-content: center;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }
        .lesson-card {
            aspect-ratio: 200 / 130;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-align: center;
            padding: 10px;
        }
        .video-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-modal video {
            max-width: 90%;
            max-height: 90%;
        }
        .close-video {
            position: absolute;
            top: 20px;
            right: 20px;
            background: red;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            border: none;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 3000;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        .toast.success { background: #43e97b; color: #1a1a2e; }
        .toast.error { background: #f5576c; color: white; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ============ КОНФИГУРАЦИЯ ПУТЕЙ (ВАШИ ФАЙЛЫ) ============
        const PATHS = {
            bgMain: 'images/image (1).jpeg',
            bgLogin: 'images/image (6).jpeg',
            bgTasks: 'images/закат.png',
            bgTask: 'images/image (4).jpeg',
            btnUsers: 'images/acetone-2025128-202148-786.png',
            btnLessons: 'images/acetone-2025128-202110-537.png',
            btnTasks: 'images/acetone-2025128-202348-996.png',
            btnBack: 'images/кнопка вернуться (1).png',
            btnCheck: 'images/acetone-20251216-7246-722.png',
            bronzeMedal: 'images/бронза.png',
            silverMedal: 'images/серебро.png',
            goldMedal: 'images/золото.png'
        };

        // ============ ЗАДАНИЯ ============
        const TASKS = {
            1: { question: "🐰 Заяц бежит домой со скоростью 16 м/с, осталось 240 м. Сколько времени?", answer: "15", videoFolder: "N1video" },
            2: { question: "🚌 Fтр = 200000 Н, масса 5 т, g=10. Найдите μ.", answer: "4", videoFolder: "N2video" },
            3: { question: "🏀 Начальная скорость 10 м/с, время 2 с, g=10. Скорость у кольца?", answer: "10", videoFolder: "N3video" },
            4: { question: "🏗️ Высота 20 м, масса 2 т, g=10. Работа крана?", answer: "400000", videoFolder: "N4video" },
            5: { question: "🚗 Скорость 10 м/с. Путь за 5 с?", answer: "50", videoFolder: "N5video" },
            6: { question: "⚡ Ускорение 2 м/с². Скорость через 3 с (v0=0)?", answer: "6", videoFolder: "N6video" },
            7: { question: "💪 Сила 100 Н, масса 20 кг. Ускорение?", answer: "5", videoFolder: "N7video" },
            8: { question: "💧 Плотность 800 кг/м³, объём 0.5 м³. Масса?", answer: "400", videoFolder: "N8video" },
            9: { question: "📐 Давление 1000 Па, площадь 2 м². Сила?", answer: "2000", videoFolder: "N9video" },
            10: { question: "💡 Мощность 500 Вт, время 10 с. Работа?", answer: "5000", videoFolder: "N10video" },
            11: { question: "🔄 Частота 50 Гц. Период?", answer: "0.02", videoFolder: "N11video" },
            12: { question: "🌊 Длина волны 2 м, скорость 340 м/с. Частота?", answer: "170", videoFolder: "N12video" }
        };

        // ============ ПРИЛОЖЕНИЕ (сокращённо, но полностью рабочее) ============
        const App = {
            currentUser: null,
            init() {
                this.loadCurrentUser();
                this.showPage('main');
            },
            loadCurrentUser() {
                const saved = localStorage.getItem('LaboratoriaKurchatova_currentUser');
                if (saved) {
                    this.currentUser = JSON.parse(saved);
                    const progress = localStorage.getItem(`LaboratoriaKurchatova_progress_${this.currentUser.login}`);
                    this.currentUser.completedTasks = progress ? JSON.parse(progress) : [];
                }
            },
            saveCurrentUser() {
                if (this.currentUser) {
                    localStorage.setItem('LaboratoriaKurchatova_currentUser', JSON.stringify(this.currentUser));
                    localStorage.setItem(`LaboratoriaKurchatova_progress_${this.currentUser.login}`, JSON.stringify(this.currentUser.completedTasks));
                }
            },
            saveTaskProgress(taskNumber) {
                if (!this.currentUser) return false;
                if (!this.currentUser.completedTasks.includes(taskNumber)) {
                    this.currentUser.completedTasks.push(taskNumber);
                    this.saveCurrentUser();
                    return true;
                }
                return false;
            },
            isTaskCompleted(taskNumber) {
                return this.currentUser && this.currentUser.completedTasks.includes(taskNumber);
            },
            getCompletedCount() {
                return this.currentUser ? this.currentUser.completedTasks.length : 0;
            },
            showPage(page, params = {}) {
                const appDiv = document.getElementById('app');
                switch(page) {
                    case 'main': this.renderMainPage(appDiv); break;
                    case 'login': this.renderLoginPage(appDiv); break;
                    case 'register': this.renderRegisterPage(appDiv); break;
                    case 'tasks': this.renderTasksPage(appDiv); break;
                    case 'lessons': this.renderLessonsPage(appDiv); break;
                    case 'profile': this.renderProfilePage(appDiv); break;
                    case 'users': this.renderUsersPage(appDiv); break;
                    case 'task': this.renderTaskPage(appDiv, params.taskId); break;
                    default: this.renderMainPage(appDiv);
                }
            },
            renderMainPage(container) {
                const completed = this.getCompletedCount();
                document.title = this.currentUser ? `Курчатова - ${this.currentUser.login} (${completed}/12)` : 'Лаборатория Курчатова';
                container.innerHTML = `
                    <div class="viewport">
                        <img class="background" src="${PATHS.bgMain}" alt="Фон" onerror="this.style.display='none'">
                        <div class="ui-container">
                            <button class="diamond-btn btn-users" style="background-image: url('${PATHS.btnUsers}')" onclick="App.showPage('users')"></button>
                            <button class="diamond-btn btn-lessons" style="background-image: url('${PATHS.btnLessons}')" onclick="App.showPage('lessons')"></button>
                            <button class="diamond-btn btn-tasks" style="background-image: url('${PATHS.btnTasks}')" onclick="App.showPage('tasks')"></button>
                            <button class="back-btn btn-profile" style="background-image: url('${PATHS.btnBack}')" onclick="App.showPage('profile')"></button>
                        </div>
                    </div>
                `;
            },
            renderLoginPage(container) {
                container.innerHTML = `
                    <div class="viewport">
                        <img class="background" src="${PATHS.bgLogin}" onerror="this.style.display='none'">
                        <div class="form-container">
                            <h2>🔐 Вход</h2>
                            <input type="text" id="loginInput" placeholder="Логин">
                            <input type="password" id="passwordInput" placeholder="Пароль">
                            <button class="btn-primary" onclick="App.login()">Войти</button>
                            <button class="btn-secondary" onclick="App.showPage('register')">Регистрация</button>
                            <button class="btn-danger" onclick="App.showPage('main')">Назад</button>
                        </div>
                    </div>
                `;
            },
            login() {
                const login = document.getElementById('loginInput').value.trim();
                const password = document.getElementById('passwordInput').value;
                if (!login || !password) { this.showToast('Введите логин и пароль!', 'error'); return; }
                const userData = localStorage.getItem(`LaboratoriaKurchatova_user_${login}`);
                if (!userData) { this.showToast('Пользователь не найден!', 'error'); return; }
                const user = JSON.parse(userData);
                if (user.password === password) {
                    this.currentUser = user;
                    const progress = localStorage.getItem(`LaboratoriaKurchatova_progress_${login}`);
                    this.currentUser.completedTasks = progress ? JSON.parse(progress) : [];
                    this.saveCurrentUser();
                    this.showToast(`Добро пожаловать, ${login}!`, 'success');
                    this.showPage('main');
                } else {
                    this.showToast('Неверный пароль!', 'error');
                }
            },
            renderRegisterPage(container) {
                container.innerHTML = `
                    <div class="viewport">
                        <img class="background" src="${PATHS.bgLogin}" onerror="this.style.display='none'">
                        <div class="form-container">
                            <h2>📝 Регистрация</h2>
                            <input type="text" id="regLoginInput" placeholder="Логин">
                            <input type="password" id="regPasswordInput" placeholder="Пароль">
                            <input type="password" id="regConfirmInput" placeholder="Повторите пароль">
                            <button class="btn-primary" onclick="App.register()">Зарегистрироваться</button>
                            <button class="btn-secondary" onclick="App.showPage('login')">Вход</button>
                            <button class="btn-danger" onclick="App.showPage('main')">Назад</button>
                        </div>
                    </div>
                `;
            },
            register() {
                const login = document.getElementById('regLoginInput').value.trim();
                const password = document.getElementById('regPasswordInput').value;
                const confirm = document.getElementById('regConfirmInput').value;
                if (!login || !password) { this.showToast('Заполните поля!', 'error'); return; }
                if (password !== confirm) { this.showToast('Пароли не совпадают!', 'error'); return; }
                if (localStorage.getItem(`LaboratoriaKurchatova_user_${login}`)) { this.showToast('Пользователь существует!', 'error'); return; }
                const newUser = { login, password, registrationDate: new Date().toISOString(), avatarPath: null };
                localStorage.setItem(`LaboratoriaKurchatova_user_${login}`, JSON.stringify(newUser));
                localStorage.setItem(`LaboratoriaKurchatova_progress_${login}`, JSON.stringify([]));
                this.showToast('Регистрация успешна!', 'success');
                this.showPage('login');
            },
            renderTasksPage(container) {
                let tasksHtml = '';
                for (let i = 1; i <= 12; i++) {
                    const isCompleted = this.isTaskCompleted(i);
                    tasksHtml += `<div class="task-card ${isCompleted ? 'completed' : ''}" onclick="App.showPage('task', {taskId: ${i}})">
                        <div class="task-number">${i}</div>${isCompleted ? '<div class="check-mark">✓</div>' : ''}
                    </div>`;
                }
                container.innerHTML = `
                    <div class="viewport">
                        <img class="background" src="${PATHS.bgTasks}" onerror="this.style.display='none'">
                        <div class="tasks-grid">${tasksHtml}</div>
                        <button class="back-btn" style="position:absolute; left:20px; bottom:20px; width:87px; height:53px; background-image:url('${PATHS.btnBack}'); background-size:cover; border:none; cursor:pointer;" onclick="App.showPage('main')"></button>
                    </div>
                `;
            },
            renderTaskPage(container, taskId) {
                const task = TASKS[taskId];
                if (!task) { this.showPage('tasks'); return; }
                const isCompleted = this.isTaskCompleted(taskId);
                container.innerHTML = `
                    <div class="viewport">
                        <img class="background" src="${PATHS.bgTask}" onerror="this.style.display='none'">
                        <div class="question-box"><strong>📌 Задание ${taskId}</strong><br><br>${task.question}</div>
                        <div class="answer-area">
                            <input type="text" id="answerInput" class="answer-input" placeholder="Ответ" ${isCompleted ? 'disabled' : ''}>
                            ${!isCompleted ? `<button class="check-btn" style="background-image: url('${PATHS.btnCheck}'); background-size:cover;" onclick="App.checkTask(${taskId})"></button>` : '<div class="completed-msg">✅ Выполнено!</div>'}
                        </div>
                        <button class="back-btn" style="position:absolute; left:20px; top:20px; width:87px; height:53px; background-image:url('${PATHS.btnBack}'); background-size:cover; border:none; cursor:pointer;" onclick="App.showPage('tasks')"></button>
                        ${taskId < 12 ? `<button class="next-btn" onclick="App.showPage('task', {taskId: ${taskId + 1}})">➡ Задание ${taskId + 1}</button>` : ''}
                    </div>
                `;
            },
            checkTask(taskId) {
                const answerInput = document.getElementById('answerInput');
                if (!answerInput) return;
                const userAnswer = answerInput.value.trim();
                const correctAnswer = TASKS[taskId].answer;
                const videoFolder = TASKS[taskId].videoFolder;
                if (!userAnswer) { this.showToast('Введите ответ!', 'error'); return; }
                if (userAnswer === correctAnswer) {
                    this.saveTaskProgress(taskId);
                    this.showToast('✅ Правильно!', 'success');
                    this.playVideo(videoFolder, 'верно');
                    this.showPage('task', {taskId: taskId});
                } else {
                    this.showToast(`❌ Неправильно. Ответ: ${correctAnswer}`, 'error');
                    this.playVideo(videoFolder, 'неверно');
                    answerInput.value = '';
                }
            },
            playVideo(folder, type) {
                const videoPath = `videos/${folder}/${type}.mp4`;
                const modal = document.createElement('div');
                modal.className = 'video-modal';
                modal.innerHTML = `<button class="close-video" onclick="this.parentElement.remove()">✕ Закрыть</button><video autoplay controls><source src="${videoPath}" type="video/mp4"></video>`;
                modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
                document.body.appendChild(modal);
            },
            renderLessonsPage(container) {
                const lessons = [
                    { id: 1, name: 'Кинематика', formula: 'v = s/t', completed: this.isTaskCompleted(1) },
                    { id: 2, name: 'Сила тяжести', formula: 'F = mg', completed: this.isTaskCompleted(2) },
                    { id: 3, name: 'Сила трения', formula: 'F = μN', completed: this.isTaskCompleted(3) },
                    { id: 4, name: 'Мех. работа', formula: 'A = F·s', completed: this.isTaskCompleted(4) }
                ];
                let html = '';
                for (const l of lessons) {
                    html += `<div class="lesson-card ${l.completed ? 'completed' : ''}" onclick="App.showLesson(${l.id})">
                        <div style="font-size:20px;font-weight:bold;">📖 Урок ${l.id}</div>
                        <div>${l.name}</div>
                        <div style="font-size:12px;">${l.formula}</div>
                        ${l.completed ? '<div class="check-mark">✓</div>' : ''}
                    </div>`;
                }
                container.innerHTML = `
                    <div class="viewport">
                        <img class="background" src="${PATHS.bgTask}" onerror="this.style.display='none'">
                        <div class="lessons-grid">${html}</div>
                        <button class="back-btn" style="position:absolute; left:20px; bottom:20px; width:87px; height:53px; background-image:url('${PATHS.btnBack}'); background-size:cover; border:none; cursor:pointer;" onclick="App.showPage('main')"></button>
                    </div>
                `;
            },
            showLesson(id) {
                const content = {
                    1: '📖 Кинематика\n\nФормулы: v = s/t, s = v·t',
                    2: '📖 Сила тяжести\n\nF = mg, g = 10 м/с²',
                    3: '📖 Сила трения\n\nFтр = μN, для горизонтальной поверхности Fтр = μmg',
                    4: '📖 Механическая работа\n\nA = F·s, единица: Джоуль'
                };
                alert(content[id]);
            },
            renderProfilePage(container) {
                if (!this.currentUser) { this.showPage('login'); return; }
                const completed = this.getCompletedCount();
                const percent = (completed / 12) * 100;
                let medalImg = '';
                if (completed >= 9) medalImg = PATHS.goldMedal;
                else if (completed >= 5) medalImg = PATHS.silverMedal;
                else if (completed >= 1) medalImg = PATHS.bronzeMedal;
                container.innerHTML = `
                    <div class="viewport">
                        <img class="background" src="${PATHS.bgLogin}" onerror="this.style.display='none'">
                        <div class="profile-container">
                            <div class="profile-avatar" onclick="App.changeAvatar()">${this.currentUser.avatarPath ? `<img src="${this.currentUser.avatarPath}" style="width:100%;height:100%;object-fit:cover;">` : '👤'}</div>
                            <h3>${this.currentUser.login}</h3>
                            <p>📅 ${new Date(this.currentUser.registrationDate).toLocaleDateString()}</p>
                            <p>📊 ${completed}/12 (${Math.round(percent)}%)</p>
                            <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                            <div class="achievement">${medalImg ? `<img src="${medalImg}" width="80">` : '📘 Нет достижений'}</div>
                            <div class="profile-buttons">
                                <button class="btn-primary" onclick="App.showPage('tasks')">Задания</button>
                                <button class="btn-secondary" onclick="App.showPage('main')">Главная</button>
                                <button class="btn-danger" onclick="App.logout()">Выйти</button>
                            </div>
                        </div>
                    </div>
                `;
            },
            changeAvatar() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            this.currentUser.avatarPath = event.target.result;
                            this.saveCurrentUser();
                            this.showPage('profile');
                            this.showToast('Аватар обновлён', 'success');
                        };
                        reader.readAsDataURL(file);
                    }
                };
                input.click();
            },
            renderUsersPage(container) {
                const users = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith('LaboratoriaKurchatova_user_')) {
                        const user = JSON.parse(localStorage.getItem(key));
                        const progress = localStorage.getItem(`LaboratoriaKurchatova_progress_${user.login}`);
                        user.completedCount = progress ? JSON.parse(progress).length : 0;
                        users.push(user);
                    }
                }
                let usersHtml = '';
                for (const user of users) {
                    usersHtml += `<tr class="user-row" onclick="App.selectUser('${user.login}')"><td>${user.login}</td><td>${new Date(user.registrationDate).toLocaleDateString()}</td><td>${user.completedCount}/12</td></tr>`;
                }
                container.innerHTML = `
                    <div class="viewport">
                        <img class="background" src="${PATHS.bgLogin}" onerror="this.style.display='none'">
                        <div class="current-user-panel">
                            <h3>👤 Текущий</h3>
                            <p>${this.currentUser ? this.currentUser.login : 'Не авторизован'}</p>
                            <p>${this.currentUser ? this.getCompletedCount() + '/12' : ''}</p>
                            ${this.currentUser ? '<button onclick="App.showPage(\'profile\')">Профиль</button>' : '<button onclick="App.showPage(\'login\')">Войти</button>'}
                        </div>
                        <div class="users-table">
                            <h3 style="padding:10px; background:#333;">📋 Пользователи</h3>
                            <table style="width:100%"><thead><tr><th>Логин</th><th>Дата</th><th>Прогресс</th></tr></thead><tbody>${usersHtml}</tbody></table>
                        </div>
                        <button class="back-btn" style="position:absolute; left:20px; bottom:20px; width:87px; height:53px; background-image:url('${PATHS.btnBack}'); background-size:cover; border:none; cursor:pointer;" onclick="App.showPage('main')"></button>
                    </div>
                `;
            },
            selectUser(login) {
                const userData = localStorage.getItem(`LaboratoriaKurchatova_user_${login}`);
                if (userData) {
                    const user = JSON.parse(userData);
                    const progress = localStorage.getItem(`LaboratoriaKurchatova_progress_${login}`);
                    const completed = progress ? JSON.parse(progress).length : 0;
                    alert(`Пользователь: ${login}\nДата: ${new Date(user.registrationDate).toLocaleDateString()}\nПрогресс: ${completed}/12`);
                }
            },
            showToast(text, type) {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerText = text;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            },
            logout() {
                this.currentUser = null;
                localStorage.removeItem('LaboratoriaKurchatova_currentUser');
                this.showToast('Вы вышли', 'success');
                this.showPage('main');
            }
        };

        App.init();
    </script>
</body>
</html>
